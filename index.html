<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA &amp; CGPA Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-mesh" aria-hidden="true"></div>
<div class="bg-grain" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 48 48" width="34" height="34" aria-hidden="true">
        <polygon points="24,4 44,24 24,44 4,24" fill="none" stroke="url(#gradStroke)" stroke-width="3"/>
        <polygon points="24,14 34,24 24,34 14,24" fill="url(#gradFill)"/>
        <defs>
          <linearGradient id="gradStroke" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="var(--mint)"/>
            <stop offset="1" stop-color="var(--pine)"/>
          </linearGradient>
          <linearGradient id="gradFill" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="var(--pine)"/>
            <stop offset="1" stop-color="var(--mint)"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="brand-text">
      <h1>GPA &amp; CGPA Ledger</h1>
    </div>
  </div>

  <div class="topbar-actions">
    <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle dark mode" title="Toggle theme">
      <svg id="iconSun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg id="iconMoon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
    </button>
    <button id="resetBtn" class="icon-btn danger" type="button" aria-label="Reset all data" title="Reset all data">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
  </div>
</header>

<div class="mode-switch-wrap">
  <div class="mode-switch" id="modeSwitch" role="tablist" aria-label="Calculator mode">
    <button class="mode-btn" data-mode="gpa" role="tab" aria-selected="false" type="button">
      GPA <span class="mode-btn-sub">single semester</span>
    </button>
    <button class="mode-btn" data-mode="cgpa" role="tab" aria-selected="false" type="button">
      CGPA <span class="mode-btn-sub">all semesters</span>
    </button>
  </div>
</div>

<main class="layout">

  <section class="ledger-column">
    <div id="semesterList" class="semester-list"></div>

    <button id="addSemesterBtn" class="add-semester-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add Semester
    </button>
  </section>

  <aside class="summary-column">
    <div class="glass-card gauge-card">
      <span class="card-eyebrow" id="gaugeEyebrow">Cumulative Standing</span>
      <div class="gauge-wrap">
        <svg id="gaugeSvg" viewBox="0 0 240 150" class="gauge-svg">
          <defs>
            <linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#e05252"/>
              <stop offset="0.45" stop-color="#e0b23f"/>
              <stop offset="0.75" stop-color="var(--mint)"/>
              <stop offset="1" stop-color="var(--pine)"/>
            </linearGradient>
          </defs>
          <path id="gaugeTrack" d="M 20 130 A 100 100 0 0 1 220 130" fill="none" stroke-linecap="round"/>
          <path id="gaugeFill" d="M 20 130 A 100 100 0 0 1 220 130" fill="none" stroke="url(#gaugeGrad)" stroke-linecap="round"/>
          <g id="gaugeTicks"></g>
        </svg>
        <div class="gauge-readout">
          <span id="cgpaValue" class="gauge-number">0.00</span>
          <span class="gauge-label" id="gaugeLabelText">CGPA / 4.00</span>
        </div>
      </div>
      <div class="gauge-stats">
        <div class="stat">
          <span id="totalCredits" class="stat-value">0</span>
          <span class="stat-label">Credits Earned</span>
        </div>
        <div class="stat" id="semesterCountStat">
          <span id="semesterCount" class="stat-value">0</span>
          <span class="stat-label">Semesters</span>
        </div>
      </div>
    </div>

    <div class="glass-card legend-card">
      <span class="card-eyebrow">Grade Key</span>
      <div class="legend-grid" id="legendGrid"></div>
    </div>
  </aside>

</main>

<footer class="page-footer">
  <p>grades saved automatically on this device</p>
</footer>

<template id="semesterTemplate">
  <div class="glass-card semester-card" data-semester-id="">
    <div class="semester-head">
      <input type="text" class="semester-title-input" value="Semester" aria-label="Semester name">
      <div class="semester-head-right">
        <div class="semester-gpa-pill">
          <span class="pill-label">GPA</span>
          <span class="pill-value semester-gpa-value">0.00</span>
        </div>
        <button class="icon-btn danger remove-semester-btn" type="button" aria-label="Remove semester" title="Remove semester">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

    <div class="course-table">
      <div class="course-row course-row--head">
        <span>Course</span>
        <span>Credits</span>
        <span>Grade</span>
        <span></span>
      </div>
      <div class="course-rows"></div>
    </div>

    <button class="add-course-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add Course
    </button>

    <div class="semester-progress-track">
      <div class="semester-progress-fill"></div>
    </div>
  </div>
</template>

<template id="cgpaSemesterTemplate">
  <div class="glass-card cgpa-semester-card" data-semester-id="">
    <div class="semester-head">
      <input type="text" class="semester-title-input" value="Semester" aria-label="Semester name">
      <div class="semester-head-right">
        <button class="icon-btn danger remove-semester-btn" type="button" aria-label="Remove semester" title="Remove semester">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

    <div class="cgpa-fields">
      <label class="cgpa-field">
        <span class="cgpa-field-label">Credit Hours</span>
        <input type="number" class="semester-credits-input" min="0" max="60" step="1" value="15" inputmode="numeric" aria-label="Credit hours for this semester">
      </label>
      <label class="cgpa-field">
        <span class="cgpa-field-label">GPA</span>
        <input type="number" class="semester-gpa-input" min="0" max="4" step="0.01" value="0.00" inputmode="decimal" aria-label="GPA for this semester">
      </label>
    </div>

    <div class="semester-progress-track">
      <div class="semester-progress-fill"></div>
    </div>
  </div>
</template>

<template id="courseRowTemplate">
  <div class="course-row" data-course-id="">
    <input type="text" class="course-name-input" placeholder="e.g. Database Systems" aria-label="Course name">
    <select class="course-credits-select" aria-label="Credit hours">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3" selected>3</option>
      <option value="4">4</option>
    </select>
    <select class="course-grade-select" aria-label="Grade"></select>
    <button class="remove-course-btn icon-btn danger" type="button" aria-label="Remove course">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
</template>

<script src="script.js"></script>
</body>
</html>
